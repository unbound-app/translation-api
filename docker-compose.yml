services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: translation-libretranslate
    restart: unless-stopped
    environment:
      LT_DISABLE_WEB_UI: "true"
    volumes:
      - libretranslate-models:/home/libretranslate/.local/share/argos-translate
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: translation-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - internal

  auth-proxy:
    build: .
    container_name: translation-auth-proxy
    restart: unless-stopped
    depends_on:
      - libretranslate
      - redis
    environment:
      NODE_ENV: production
      PORT: "47281"
      OP_CONNECT_TOKEN: ${OP_UNBOUND_TOKEN}
      OP_CONNECT_SERVER_URL: https://1p.unbound.rip
      REDIS_URL: redis://redis:6379
      LIBRETRANSLATE_URL: http://libretranslate:5000
    ports:
      - "127.0.0.1:47281:47281"
    networks:
      - internal

networks:
  internal:

volumes:
  libretranslate-models:
  redis-data:
